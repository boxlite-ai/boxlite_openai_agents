name: Publish to PyPI

on:
  push:
    tags: ['v*.*.*']           # 推 tag 触发,如 v0.1.0
  release:
    types: [published]         # 或 GitHub Release 触发

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build
        run: python -m build
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/boxlite-openai-agents
    permissions:
      id-token: write          # OIDC 必需,这是关键
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')   # 只在 tag 时发正式 PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/boxlite-openai-agents
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1